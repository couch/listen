<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>muxtape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      background: var(--bg, #c1440e);
      color: rgba(255,255,255,0.9);
      -webkit-tap-highlight-color: transparent;
    }

    #file-warning {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(0,0,0,0.7);
      color: #fff;
      font-size: 13px;
      text-align: center;
      padding: 10px 16px;
      z-index: 100;
      line-height: 1.5;
    }

    #tape {
      padding: 56px 0 260px;
    }

    #tape-title {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      opacity: 0.65;
      margin-bottom: 24px;
      padding: 0 28px;
    }

    #track-list { list-style: none; }

    .track {
      display: flex;
      align-items: center;
      padding: 14px 28px;
      min-height: 60px;
      cursor: pointer;
      gap: 16px;
      transition: background 0.1s;
      user-select: none;
      -webkit-user-select: none;
      position: relative;
      overflow: hidden;
    }

    @media (hover: hover) { .track:hover { background: rgba(0,0,0,0.1); } }
    .track.active { background: rgba(0,0,0,0.15); }

    .track-progress {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0%;
      background: rgba(0,0,0,0.13);
      pointer-events: none;
      transition: width 0.5s linear;
    }

    .track.kb-focused {
      box-shadow: inset 2px 0 0 rgba(255,255,255,0.55);
    }

    .track:focus { outline: none; }

    .track-num {
      font-size: 13px;
      opacity: 0.4;
      width: 20px;
      text-align: right;
      flex-shrink: 0;
    }

    .track-info { flex: 1; min-width: 0; }

    .track-title {
      font-size: 17px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-artist {
      font-size: 14px;
      opacity: 0.6;
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Bottom bar */
    #bar {
      position: fixed;
      bottom: var(--peek-push, 0px);
      left: 0;
      right: 0;
      background-color: rgba(0,0,0,0.42);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 14px 28px max(16px, env(safe-area-inset-bottom));
      transform: translateY(calc(100% + 1px));
      transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
      z-index: 2;
    }

    #bar.bar-visible {
      transform: translateY(0);
    }

    #scrubber {
      width: 100%;
      height: 3px;
      background: rgba(255,255,255,0.18);
      border-radius: 2px;
      cursor: pointer;
      margin-bottom: 14px;
      position: relative;
      touch-action: none;
    }

    /* Expand touch target without changing visual size */
    #scrubber::before {
      content: "";
      position: absolute;
      inset: -12px 0;
    }

    #scrubber-fill {
      height: 100%;
      width: 0%;
      background: rgba(255,255,255,0.75);
      border-radius: 2px;
      pointer-events: none;
    }

    #controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #btn-play {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 4px;
      flex-shrink: 0;
      opacity: 0.85;
      min-width: 32px;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #now-playing { flex: 1; min-width: 0; }

    #np-title {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #np-artist {
      font-size: 12px;
      opacity: 0.55;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    #time {
      font-size: 12px;
      opacity: 0.4;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    #attribution {
      font-size: 10px;
      opacity: 0.28;
      text-align: right;
      margin-top: 10px;
      color: inherit;
      text-decoration: none;
      display: none;
      transition: opacity 0.15s;
    }

    #attribution:hover { opacity: 0.55; }

    #yt-player {
      position: fixed;
      left: -9999px;
      top: 0;
      width: 1px;
      height: 1px;
    }

    @media (max-width: 480px) {
      #tape { padding-bottom: 240px; }
      #tape-title { font-size: 15px; padding: 0 20px; }
      .track { padding: 13px 20px; gap: 14px; }
      .track-title { font-size: 16px; }
      .track-artist { font-size: 13px; }
      #bar { padding: 12px 20px max(14px, env(safe-area-inset-bottom)); }
      #time { display: none; }
    }

    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* ── Divider — anchored to bar's bottom edge, moves as one unit ── */
    #bar::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 28px;
      right: 28px;
      height: 2px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 50%, rgba(255,255,255,0.06) 50%);
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    #bar.bar-visible::before { opacity: 1; }

    @media (max-width: 480px) {
      #bar::before { left: 20px; right: 20px; }
    }

    /* ── Peek panel ── */

    #peek-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background-color: rgba(0,0,0,0.42);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 10px 28px max(24px, env(safe-area-inset-bottom));
      transform: translateY(100%);
      will-change: transform;
      z-index: 1;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .peek-top {
      margin-bottom: 7px;
    }

    .peek-top span { font-size: 14px; opacity: 0.8; }

    #peek-meta {
      font-size: 12px;
      opacity: 0.38;
      letter-spacing: 0.04em;
    }

    @media (max-width: 480px) {
      #peek-panel { padding: 8px 20px max(20px, env(safe-area-inset-bottom)); }
      .peek-top span { font-size: 13px; }
    }

    #pi-btn {
      position: fixed;
      bottom: 16px;
      right: 16px;
      z-index: 10;
      background: none;
      border: none;
      color: rgba(255,255,255,0.3);
      font-size: 16px;
      font-family: inherit;
      line-height: 1;
      cursor: pointer;
      padding: 18px;
      -webkit-tap-highlight-color: transparent;
      transition: color 0.15s;
      user-select: none;
      -webkit-user-select: none;
    }

    #pi-btn:hover { color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>

<div id="file-warning">
  Open this via a local server, not as a file:// URL — YouTube's API requires HTTP.<br>
  Run: <code>cd muxtape &amp;&amp; python3 -m http.server 8080</code> then visit <code>localhost:8080</code>
</div>

<div id="tape" role="region" aria-label="Playlist">
  <p id="tape-title"></p>
  <ul id="track-list"></ul>
</div>

<div id="bar" role="region" aria-label="Player controls">
  <div id="scrubber" role="slider" aria-label="Playback position" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-valuetext="0:00"><div id="scrubber-fill"></div></div>
  <div id="controls">
    <button id="btn-play" aria-label="Play">▶&#xFE0E;</button>
    <div id="now-playing">
      <div id="np-title"></div>
      <div id="np-artist"></div>
    </div>
    <div id="time"></div>
  </div>
  <a id="attribution" href="#" target="_blank" rel="noopener noreferrer">audio via YouTube</a>
</div>

<div id="peek-panel" aria-hidden="true">
  <div class="peek-top">
    <span id="peek-distance"></span>
  </div>
  <div id="peek-meta"></div>
</div>

<button id="pi-btn" hidden aria-label="Enable tilt peek">π</button>
<div id="a11y-announce" aria-live="polite" aria-atomic="true" class="sr-only"></div>
<div id="yt-player" aria-hidden="true"></div>

<script src="config.js"></script>
<script>
  if (location.protocol === 'file:') {
    document.getElementById('file-warning').style.display = 'block';
  }

  const PALETTE = [
    "#a83232","#c1440e","#9c6b1a","#4a7a2e","#2e7a6e",
    "#2e4a7a","#5c2e7a","#7a2e5c","#4a5f6e","#7a6b2e"
  ];

  // Progress Pride flag colors in spectral order — every adjacent pair is harmonious,
  // and the cycle wraps (pink→brown→red) within the warm family.
  const PRIDE_COLORS = [
    "#b33030","#c25a10","#9a7a10","#2a7a30",
    "#1e7a7a","#1a4a8a","#5a2080","#9e2a60","#6b3318"
  ];
  const isPride = TAPE.color === 'pride';
  // Random entry point into the spectrum — adjacent tracks always see adjacent hues
  const prideStartIdx = isPride ? Math.floor(Math.random() * PRIDE_COLORS.length) : 0;
  const trackPrideColors = TAPE.tracks.map((_, i) =>
    PRIDE_COLORS[(prideStartIdx + i) % PRIDE_COLORS.length]
  );

  const STRINGS = {
    en: { mo:['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], tr:n=>n===1?'1 track':`${n} tracks`, cr:'created', ed:'edited', nb:'listening from nearby', fa:n=>`listening from ${n.toLocaleString()} miles away`, au:'audio via YouTube', mi:true, pl:'Playlist', pc:'Player controls', pp:'Playback position', play:'Play', pause:'Pause', by:(t,a)=>`${t} by ${a}`, np:(t,a)=>`Now playing: ${t} by ${a}`, pe:'Playlist ended.', of:(c,d)=>`${c} of ${d}`, pi:'Enable tilt peek' },
    es: { mo:['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'], tr:n=>n===1?'1 pista':`${n} pistas`, cr:'creado', ed:'editado', nb:'escuchando desde cerca', fa:n=>`escuchando desde ${n.toLocaleString()} km`, au:'audio vía YouTube', mi:false, pl:'Lista de reproducción', pc:'Controles del reproductor', pp:'Posición de reproducción', play:'Reproducir', pause:'Pausar', by:(t,a)=>`${t} de ${a}`, np:(t,a)=>`Reproduciendo: ${t} de ${a}`, pe:'Lista de reproducción finalizada.', of:(c,d)=>`${c} de ${d}`, pi:'Activar vista con inclinación' },
    it: { mo:['gen','feb','mar','apr','mag','giu','lug','ago','set','ott','nov','dic'], tr:n=>n===1?'1 brano':`${n} brani`, cr:'creato', ed:'modificato', nb:'in ascolto da vicino', fa:n=>`in ascolto a ${n.toLocaleString()} km`, au:'audio via YouTube', mi:false, pl:'Playlist', pc:'Controlli del lettore', pp:'Posizione di riproduzione', play:'Riproduci', pause:'Pausa', by:(t,a)=>`${t} di ${a}`, np:(t,a)=>`In riproduzione: ${t} di ${a}`, pe:'Playlist terminata.', of:(c,d)=>`${c} di ${d}`, pi:'Attiva anteprima inclinazione' },
    de: { mo:['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'], tr:n=>`${n} Titel`, cr:'erstellt', ed:'bearbeitet', nb:'von hier in der Nähe', fa:n=>`aus ${n.toLocaleString()} km`, au:'Musik via YouTube', mi:false, pl:'Wiedergabeliste', pc:'Player-Steuerelemente', pp:'Wiedergabeposition', play:'Abspielen', pause:'Pausieren', by:(t,a)=>`${t} von ${a}`, np:(t,a)=>`Jetzt: ${t} von ${a}`, pe:'Wiedergabeliste beendet.', of:(c,d)=>`${c} von ${d}`, pi:'Kippansicht aktivieren' },
    fr: { mo:['jan','fév','mar','avr','mai','jun','jul','aoû','sep','oct','nov','déc'], tr:n=>n===1?'1 titre':`${n} titres`, cr:'créé', ed:'modifié', nb:"à l'écoute depuis tout près", fa:n=>`à l'écoute depuis ${n.toLocaleString()} km`, au:'audio via YouTube', mi:false, pl:'Liste de lecture', pc:'Commandes du lecteur', pp:'Position de lecture', play:'Lecture', pause:'Pause', by:(t,a)=>`${t} par ${a}`, np:(t,a)=>`En lecture : ${t} par ${a}`, pe:'Liste de lecture terminée.', of:(c,d)=>`${c} sur ${d}`, pi:"Activer l'aperçu inclinaison" },
    zh: { mo:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], tr:n=>`${n} 首`, cr:'创建', ed:'编辑', nb:'正在附近收听', fa:n=>`正在从 ${n.toLocaleString()} 公里外收听`, au:'音频来自 YouTube', mi:false, pl:'播放列表', pc:'播放器控件', pp:'播放位置', play:'播放', pause:'暂停', by:(t,a)=>`${a} - ${t}`, np:(t,a)=>`正在播放：${a} - ${t}`, pe:'播放列表已结束。', of:(c,d)=>`${c} / ${d}`, pi:'启用倾斜预览' },
    ko: { mo:['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'], tr:n=>`${n}곡`, cr:'제작', ed:'수정', nb:'근처에서 듣는 중', fa:n=>`${n.toLocaleString()}km 떨어진 곳에서 듣는 중`, au:'YouTube 음원', mi:false, pl:'재생목록', pc:'플레이어 컨트롤', pp:'재생 위치', play:'재생', pause:'일시정지', by:(t,a)=>`${a} - ${t}`, np:(t,a)=>`재생 중: ${a} - ${t}`, pe:'재생목록이 종료되었습니다.', of:(c,d)=>`${c} / ${d}`, pi:'기울기 미리보기 활성화' },
    ja: { mo:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], tr:n=>`${n}曲`, cr:'作成', ed:'更新', nb:'近くで再生中', fa:n=>`${n.toLocaleString()}km 離れた場所で再生中`, au:'YouTube より配信', mi:false, pl:'プレイリスト', pc:'プレーヤーコントロール', pp:'再生位置', play:'再生', pause:'一時停止', by:(t,a)=>`${a} - ${t}`, np:(t,a)=>`再生中：${a} - ${t}`, pe:'プレイリストが終了しました。', of:(c,d)=>`${c} / ${d}`, pi:'傾き機能を有効にする' },
    ru: { mo:['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'], tr:n=>{const m=n%10,c=n%100;return m===1&&c!==11?`${n} трек`:m>=2&&m<=4&&(c<10||c>=20)?`${n} трека`:`${n} треков`;}, cr:'создан', ed:'изменён', nb:'слушаю рядом', fa:n=>`слушаю в ${n.toLocaleString()} км`, au:'аудио с YouTube', mi:false, pl:'Плейлист', pc:'Элементы управления', pp:'Позиция воспроизведения', play:'Воспроизвести', pause:'Пауза', by:(t,a)=>`${t} — ${a}`, np:(t,a)=>`Сейчас играет: ${t} — ${a}`, pe:'Плейлист завершён.', of:(c,d)=>`${c} из ${d}`, pi:'Включить просмотр наклоном' },
    hi: { mo:['जन','फ़र','मार','अप्र','मई','जून','जुल','अग','सित','अक्टू','नव','दिस'], tr:n=>`${n} ट्रैक`, cr:'बनाया', ed:'संपादित', nb:'पास से सुन रहे हैं', fa:n=>`${n.toLocaleString()} किमी दूर से सुन रहे हैं`, au:'YouTube से ऑडियो', mi:false, pl:'प्लेलिस्ट', pc:'प्लेयर नियंत्रण', pp:'प्लेबैक स्थिति', play:'चलाएं', pause:'रोकें', by:(t,a)=>`${t} - ${a}`, np:(t,a)=>`अभी चल रहा है: ${t} - ${a}`, pe:'प्लेलिस्ट समाप्त हुई।', of:(c,d)=>`${c} में से ${d}`, pi:'झुकाव पूर्वावलोकन सक्षम करें' },
    mr: { mo:['जाने','फेब्रु','मार्च','एप्रि','मे','जून','जुलै','ऑग','सप्टें','ऑक्टो','नोव्हें','डिसें'], tr:n=>`${n} ट्रॅक`, cr:'बनवले', ed:'संपादित', nb:'जवळून ऐकत आहात', fa:n=>`${n.toLocaleString()} किमी दूरून ऐकत आहात`, au:'YouTube वरून ऑडिओ', mi:false, pl:'प्लेलिस्ट', pc:'प्लेयर नियंत्रणे', pp:'प्लेबॅक स्थान', play:'प्ले करा', pause:'थांबवा', by:(t,a)=>`${t} - ${a}`, np:(t,a)=>`आता वाजत आहे: ${t} - ${a}`, pe:'प्लेलिस्ट संपली.', of:(c,d)=>`${c} / ${d}`, pi:'झुकवणे सक्षम करा' },
  };
  const lang = (navigator.language || 'en').split('-')[0].toLowerCase();
  const L = STRINGS[lang] || STRINGS.en;

  function fmtDate(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    const dd = String(+d).padStart(2, '0');
    if (lang === 'zh' || lang === 'ja') return `${y}年${+m}月${dd}日`;
    if (lang === 'ko') return `${y}년 ${+m}월 ${dd}일`;
    return `${dd} ${L.mo[+m - 1]} ${y}`;
  }

  const bg = (!TAPE.color || TAPE.color === "random" || isPride)
    ? PALETTE[Math.floor(Math.random() * PALETTE.length)]
    : TAPE.color;
  document.documentElement.style.setProperty("--bg", bg);
  document.title = TAPE.title;
  document.getElementById("tape-title").textContent = TAPE.title;
  document.getElementById("attribution").textContent = L.au;
  document.getElementById("tape").setAttribute("aria-label", L.pl);
  document.getElementById("bar").setAttribute("aria-label", L.pc);
  document.getElementById("scrubber").setAttribute("aria-label", L.pp);
  document.getElementById("btn-play").setAttribute("aria-label", L.play);
  document.getElementById("pi-btn").setAttribute("aria-label", L.pi);

  // Build track list
  const list = document.getElementById("track-list");
  TAPE.tracks.forEach((track, i) => {
    const li = document.createElement("li");
    li.className = "track";
    li.dataset.i = i;
    li.setAttribute("tabindex", "0");
    li.setAttribute("aria-label", L.by(track.title, track.artist));
    li.setAttribute("role", "button");
    li.setAttribute("aria-pressed", "false");
    li.addEventListener("focus", () => {
      if (focusedIndex === i) return; // already set by setFocused, avoid loop
      document.querySelectorAll(".track.kb-focused").forEach(el => el.classList.remove("kb-focused"));
      focusedIndex = i;
      li.classList.add("kb-focused");
    });
    li.addEventListener("blur", e => {
      if (!e.relatedTarget?.classList.contains("track")) {
        li.classList.remove("kb-focused");
        focusedIndex = -1;
      }
    });

    const num = document.createElement("span");
    num.className = "track-num";
    num.textContent = i + 1;

    const info = document.createElement("div");
    info.className = "track-info";

    const title = document.createElement("div");
    title.className = "track-title";
    title.textContent = track.title;

    const artist = document.createElement("div");
    artist.className = "track-artist";
    artist.textContent = track.artist;

    const progress = document.createElement("div");
    progress.className = "track-progress";
    if (isPride) {
      li.style.backgroundColor = trackPrideColors[i];
      li.dataset.prideColor = trackPrideColors[i];
    }

    info.append(title, artist);
    li.append(progress, num, info);
    li.addEventListener("click", () => onTrackClick(i));
    list.appendChild(li);
  });

  // Player state
  let player = null;
  let currentIndex = -1;
  let playing = false;
  let ticker = null;
  let focusedIndex = -1;

  const tag = document.createElement("script");
  tag.src = "https://www.youtube.com/iframe_api";
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = () => {
    player = new YT.Player("yt-player", {
      width: "1", height: "1",
      playerVars: {
        autoplay: 0, controls: 0, disablekb: 1,
        fs: 0, iv_load_policy: 3, rel: 0,
        modestbranding: 1, playsinline: 1,
      },
      events: {
        onReady(e) {
          // Required for background audio on iOS
          e.target.getIframe().setAttribute(
            "allow", "autoplay; encrypted-media; picture-in-picture"
          );
        },
        onStateChange: onState,
      }
    });
  };

  function onState(e) {
    if (e.data === YT.PlayerState.PLAYING) {
      playing = true;
      updateBtn();
      startTicker();
      updateMediaSession();
      startColorDrift();
    } else if (e.data === YT.PlayerState.PAUSED) {
      playing = false;
      updateBtn();
      if ("mediaSession" in navigator) navigator.mediaSession.playbackState = "paused";
      stopColorDrift();
    } else if (e.data === YT.PlayerState.ENDED) {
      next();
    }
  }

  function onTrackClick(i) {
    if (!player || !player.loadVideoById) return;
    if (i === currentIndex) {
      playing ? player.pauseVideo() : player.playVideo();
    } else {
      load(i);
    }
  }

  function load(i) {
    clearActive();
    document.getElementById("bar").classList.add("bar-visible");
    const scrubFill = document.getElementById("scrubber-fill");
    scrubFill.style.transition = "none";
    scrubFill.style.width = "0%";
    requestAnimationFrame(() => { scrubFill.style.transition = ""; });
    const scrub = document.getElementById("scrubber");
    scrub.setAttribute("aria-valuenow", "0");
    scrub.setAttribute("aria-valuetext", "0:00");
    document.getElementById("time").textContent = "";
    setReveal(peekReveal);
    currentIndex = i;
    if (isPride) {
      prideColorIdx = (prideStartIdx + i) % PRIDE_COLORS.length;
      stopColorDrift();
      document.documentElement.style.setProperty("--bg", trackPrideColors[i]);
    }
    const t = TAPE.tracks[i];
    player.loadVideoById(t.id);
    document.getElementById("np-title").textContent = t.title;
    document.getElementById("np-artist").textContent = t.artist;
    const attr = document.getElementById("attribution");
    attr.href = `https://www.youtube.com/watch?v=${t.id}`;
    attr.style.display = "block";
    const el = trackEl(i);
    el.classList.add("active");
    if (el.dataset.prideColor) {
      el.style.backgroundImage = 'linear-gradient(rgba(0,0,0,0.18),rgba(0,0,0,0.18))';
    }
    el.setAttribute("aria-pressed", "true");
    announce(L.np(t.title, t.artist));
  }

  function next() {
    if (currentIndex + 1 < TAPE.tracks.length) {
      load(currentIndex + 1);
    } else {
      clearActive();
      playing = false;
      updateBtn();
      document.getElementById("scrubber-fill").style.width = "0%";
      document.getElementById("np-title").textContent = "";
      document.getElementById("np-artist").textContent = "";
      document.getElementById("time").textContent = "";
      document.getElementById("attribution").style.display = "none";
      const s = document.getElementById("scrubber");
      s.setAttribute("aria-valuenow", "0");
      s.setAttribute("aria-valuetext", "0:00");
      announce(L.pe);
      stopColorDrift();
    }
  }

  function clearActive() {
    document.querySelectorAll(".track").forEach(el => {
      el.classList.remove("active", "playing", "paused");
      el.setAttribute("aria-pressed", "false");
      if (el.dataset.prideColor) el.style.backgroundImage = '';
      const p = el.querySelector(".track-progress");
      if (p) {
        p.style.transition = "none";
        p.style.width = "0%";
        requestAnimationFrame(() => { p.style.transition = ""; });
      }
    });
  }

  function setFocused(i) {
    document.querySelectorAll(".track.kb-focused").forEach(el => el.classList.remove("kb-focused"));
    focusedIndex = i;
    if (i < 0) return;
    const el = trackEl(i);
    if (el) {
      el.classList.add("kb-focused");
      el.focus({ preventScroll: true }); // moves real browser focus so Tab stays in sync
      el.scrollIntoView({ block: "nearest", behavior: "smooth" });
    }
  }

  document.addEventListener("keydown", e => {
    if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
    const n = TAPE.tracks.length;
    if (e.key === " ") {
      e.preventDefault();
      if (!player) return;
      if (focusedIndex >= 0) {
        onTrackClick(focusedIndex);
      } else if (currentIndex === -1) {
        load(0);
      } else {
        playing ? player.pauseVideo() : player.playVideo();
      }
    } else if (e.key === "ArrowDown" || e.key === "ArrowRight") {
      e.preventDefault();
      setFocused(focusedIndex < 0 ? (currentIndex >= 0 ? currentIndex : 0) : (focusedIndex + 1) % n);
    } else if (e.key === "ArrowUp" || e.key === "ArrowLeft") {
      e.preventDefault();
      setFocused(focusedIndex < 0 ? (currentIndex >= 0 ? currentIndex : 0) : (focusedIndex - 1 + n) % n);
    } else if (e.key === "Enter" && focusedIndex >= 0) {
      onTrackClick(focusedIndex);
    } else if (e.key === "Tab" && !e.shiftKey && document.activeElement?.id === "attribution") {
      e.preventDefault();
      setFocused(0);
    }
  });

  function trackEl(i) {
    return document.querySelector(`.track[data-i="${i}"]`);
  }

  function updateBtn() {
    const btn = document.getElementById("btn-play");
    btn.textContent = playing ? "⏸︎" : "▶︎";
    btn.setAttribute("aria-label", playing ? L.pause : L.play);
  }

  document.getElementById("btn-play").addEventListener("click", () => {
    if (!player) return;
    if (currentIndex === -1) { load(0); return; }
    playing ? player.pauseVideo() : player.playVideo();
  });

  // Scrubber — mouse
  document.getElementById("scrubber").addEventListener("click", seek);

  // Scrubber — touch
  const scrubEl = document.getElementById("scrubber");
  scrubEl.addEventListener("touchstart", handleTouch, { passive: true });
  scrubEl.addEventListener("touchmove", handleTouch, { passive: true });

  function snapSeek(pct) {
    const w = `${pct * 100}%`;
    // Scrubber fill — bypasses the 500ms ticker delay
    document.getElementById("scrubber-fill").style.width = w;
    // Track progress — disable transition for instant snap, restore for playback
    const p = trackEl(currentIndex)?.querySelector(".track-progress");
    if (p) {
      p.style.transition = "none";
      p.style.width = w;
      requestAnimationFrame(() => { p.style.transition = ""; });
    }
  }

  function seek(e) {
    if (!player || currentIndex === -1) return;
    const r = scrubEl.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
    const dur = player.getDuration();
    if (dur) { player.seekTo(pct * dur, true); snapSeek(pct); }
  }

  function handleTouch(e) {
    if (!player || currentIndex === -1) return;
    const touch = e.touches[0];
    const r = scrubEl.getBoundingClientRect();
    const pct = Math.max(0, Math.min(1, (touch.clientX - r.left) / r.width));
    const dur = player.getDuration();
    if (dur) { player.seekTo(pct * dur, true); snapSeek(pct); }
  }

  function startTicker() {
    clearInterval(ticker);
    ticker = setInterval(() => {
      if (!player || !player.getCurrentTime) return;
      const cur = player.getCurrentTime();
      const dur = player.getDuration();
      if (!dur) return;
      const pct = `${(cur / dur) * 100}%`;
      document.getElementById("scrubber-fill").style.width = pct;
      document.getElementById("time").textContent = `${fmt(cur)} / ${fmt(dur)}`;
      const p = trackEl(currentIndex)?.querySelector(".track-progress");
      if (p) p.style.width = pct;
      const s = document.getElementById("scrubber");
      s.setAttribute("aria-valuenow", Math.round((cur / dur) * 100));
      s.setAttribute("aria-valuetext", L.of(fmt(cur), fmt(dur)));
    }, 500);
  }

  function announce(msg) {
    const el = document.getElementById("a11y-announce");
    el.textContent = "";
    requestAnimationFrame(() => { el.textContent = msg; });
  }

  function fmt(s) {
    const m = Math.floor(s / 60);
    return `${m}:${String(Math.floor(s % 60)).padStart(2, "0")}`;
  }

  // ── Generative background color drift ─────────────────────────────────────
  // Interpolates slowly between palette colors while playing.
  // smootherstep keeps the first few seconds nearly imperceptible.
  const DRIFT_MS = 45000;
  let driftFrame = null, driftFrom, driftTo, driftToHex, driftStart;
  let prideColorIdx = 0;

  function hexToRgb(hex) {
    const h = hex.trim().replace("#", "");
    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
  }

  function rgbToHex([r,g,b]) {
    return "#" + [r,g,b].map(v => Math.round(Math.max(0,Math.min(255,v))).toString(16).padStart(2,"0")).join("");
  }

  function smootherstep(t) { return t*t*t*(t*(t*6-15)+10); }

  function pickDriftTarget(avoidHex) {
    const opts = PALETTE.filter(c => c !== avoidHex);
    return opts[Math.floor(Math.random() * opts.length)];
  }

  function startColorDrift() {
    if (driftFrame) return;
    const cur = document.documentElement.style.getPropertyValue("--bg").trim() || PALETTE[0];
    driftFrom = hexToRgb(cur);
    driftToHex = isPride
      ? PRIDE_COLORS[(prideColorIdx + 1) % PRIDE_COLORS.length]
      : pickDriftTarget(cur);
    driftTo = hexToRgb(driftToHex);
    driftStart = performance.now();
    driftFrame = requestAnimationFrame(tickDrift);
  }

  function tickDrift(now) {
    const t = Math.min((now - driftStart) / DRIFT_MS, 1);
    const rgb = driftFrom.map((v,i) => v + (driftTo[i] - v) * smootherstep(t));
    document.documentElement.style.setProperty("--bg", rgbToHex(rgb));
    if (t < 1) {
      driftFrame = requestAnimationFrame(tickDrift);
    } else {
      driftFrom = driftTo;
      const prev = driftToHex;
      if (isPride) {
        prideColorIdx = (prideColorIdx + 1) % PRIDE_COLORS.length;
        driftToHex = PRIDE_COLORS[(prideColorIdx + 1) % PRIDE_COLORS.length];
      } else {
        driftToHex = pickDriftTarget(prev);
      }
      driftTo = hexToRgb(driftToHex);
      driftStart = now;
      driftFrame = requestAnimationFrame(tickDrift);
    }
  }

  function stopColorDrift() {
    if (driftFrame) { cancelAnimationFrame(driftFrame); driftFrame = null; }
  }

  // ── Peek panel ───────────────────────────────────────────────────────────────
  const peekPanel = document.getElementById('peek-panel');
  const isMobile = window.matchMedia('(hover: none) and (pointer: coarse)').matches;
  let peekReveal = 0;
  let naturalBeta = null;
  let geoRequested = false;

  function setReveal(t) {
    peekReveal = t;
    const ph = peekPanel.offsetHeight || 100;
    peekPanel.style.transform = `translateY(${(1 - t) * 100}%)`;
    const barEl = document.getElementById('bar');
    const barVisible = barEl.classList.contains('bar-visible');
    if (barVisible) {
      barEl.style.setProperty('--peek-push', `${t * ph}px`);
    }
    const piEl = document.getElementById('pi-btn');
    if (piEl && !piEl.hidden) {
      const barH = barVisible ? barEl.offsetHeight : 0;
      piEl.style.bottom = `${16 + barH + t * ph}px`;
    }
  }

  (function initPeekPanel() {
    const count = TAPE.tracks?.length ?? 0;
    let meta = L.tr(count);
    const created = TAPE.created;
    const lastEdited = TAPE.lastEdited || created;
    if (created) {
      meta += ` · ${L.cr} ${fmtDate(created)}`;
      if (lastEdited && lastEdited !== created) meta += ` · ${L.ed} ${fmtDate(lastEdited)}`;
    }
    document.getElementById('peek-meta').textContent = meta;

    if (TAPE.location?.lat) {
      document.getElementById('peek-distance').textContent = '·';
    }
  })();

  function haversine(lat1, lng1, lat2, lng2) {
    const R = 6371; // km
    const r = d => d * Math.PI / 180;
    const dLat = r(lat2 - lat1), dLng = r(lng2 - lng1);
    const a = Math.sin(dLat/2)**2 +
      Math.cos(r(lat1)) * Math.cos(r(lat2)) * Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function applyViewerLocation(lat, lng) {
    if (!TAPE.location?.lat) return;
    const distKm = haversine(TAPE.location.lat, TAPE.location.lng, lat, lng);
    const dist = L.mi ? Math.round(distKm * 0.621371) : Math.round(distKm);
    const el = document.getElementById('peek-distance');
    if (el) el.textContent = distKm < 24 ? L.nb : L.fa(dist);
  }

  function requestViewerGeo() {
    if (!TAPE.location?.lat || !navigator.geolocation || geoRequested) return;
    geoRequested = true;
    navigator.geolocation.getCurrentPosition(
      pos => applyViewerLocation(pos.coords.latitude, pos.coords.longitude),
      () => { const el = document.getElementById('peek-distance'); if (el) el.textContent = ''; },
      { timeout: 10000, maximumAge: 300000 }
    );
  }

  // Mobile: tilt top of phone away → beta decreases from ~90 toward 0
  function handleOrientation(e) {
    if (e.beta === null) return;
    if (naturalBeta === null) naturalBeta = e.beta; // calibrate to natural hold on first event
    const t = Math.max(0, Math.min(1, (naturalBeta - e.beta) / 30));
    setReveal(t);
  }

  // Mobile: quick left/right roll → previous/next track
  function scrollTrackIntoView(el) {
    if (!el) return;
    const bar = document.getElementById('bar');
    const barH = bar.classList.contains('bar-visible') ? bar.offsetHeight : 0;
    const peekH = Math.round(peekReveal * (peekPanel.offsetHeight || 0));
    const bottomClearance = barH + peekH + 12;
    const rect = el.getBoundingClientRect();
    const viewH = window.innerHeight;
    if (rect.top < 60) {
      window.scrollBy({ top: rect.top - 72, behavior: 'smooth' });
    } else if (rect.bottom > viewH - bottomClearance) {
      window.scrollBy({ top: rect.bottom - (viewH - bottomClearance), behavior: 'smooth' });
    }
  }

  let flickCooldown = false;
  function handleMotion(e) {
    if (flickCooldown || !player) return;
    const rate = e.rotationRate?.gamma;
    if (!rate) return;
    if (rate > 250 && currentIndex > 0) {
      flickCooldown = true;
      setTimeout(() => { flickCooldown = false; }, 800);
      load(currentIndex - 1);
      scrollTrackIntoView(trackEl(currentIndex));
    } else if (rate < -250 && currentIndex >= 0 && currentIndex < TAPE.tracks.length - 1) {
      flickCooldown = true;
      setTimeout(() => { flickCooldown = false; }, 800);
      load(currentIndex + 1);
      scrollTrackIntoView(trackEl(currentIndex));
    }
  }

  function enableMotionListeners() {
    window.addEventListener('deviceorientation', handleOrientation);
    window.addEventListener('devicemotion', handleMotion);
  }

  // π button: opt-in to orientation + device location (mobile only)
  const piBtnEl = document.getElementById('pi-btn');
  const hasPlaylistLoc = !!TAPE.location?.lat;

  if (isMobile) {
    if (typeof DeviceOrientationEvent?.requestPermission === 'function') {
      // iOS 13+: probe for existing orientation permission
      let resolved = false;
      const earlyCheck = () => {
        if (resolved) return;
        resolved = true;
        window.removeEventListener('deviceorientation', earlyCheck);
        enableMotionListeners();
        // Orientation already granted — probe geo (silent if previously granted)
        requestViewerGeo();
        // π stays hidden
      };
      window.addEventListener('deviceorientation', earlyCheck);
      setTimeout(() => {
        if (resolved) return;
        resolved = true;
        window.removeEventListener('deviceorientation', earlyCheck);
        piBtnEl.hidden = false;
      }, 500);

      piBtnEl.addEventListener('click', async () => {
        try {
          const result = await DeviceOrientationEvent.requestPermission();
          if (result === 'granted') enableMotionListeners();
        } catch {
          enableMotionListeners();
        }
        piBtnEl.hidden = true;
        requestViewerGeo();
      });
    } else {
      // Android: orientation fires without permission — set up immediately
      enableMotionListeners();
      if (hasPlaylistLoc) {
        // Show π to request device location
        piBtnEl.hidden = false;
        piBtnEl.addEventListener('click', () => {
          piBtnEl.hidden = true;
          requestViewerGeo();
        });
      }
    }
  }

  // Desktop: cursor drift is gated behind the π button click
  if (!isMobile) {
    let desktopPeekEnabled = false;
    document.addEventListener('mousemove', e => {
      if (!desktopPeekEnabled) return;
      const vh = window.innerHeight;
      const t = Math.max(0, Math.min(1, (e.clientY - vh * 0.80) / (vh * 0.20)));
      setReveal(t);
    });
    document.addEventListener('mouseleave', () => { if (desktopPeekEnabled) setReveal(0); });
    if (hasPlaylistLoc) {
      piBtnEl.hidden = false;
      piBtnEl.addEventListener('click', () => {
        desktopPeekEnabled = true;
        piBtnEl.hidden = true;
        requestViewerGeo();
      });
    }
  }

  // MediaSession API — lock screen controls on mobile
  function updateMediaSession() {
    if (!("mediaSession" in navigator)) return;
    const t = TAPE.tracks[currentIndex];
    navigator.mediaSession.metadata = new MediaMetadata({
      title: t.title,
      artist: t.artist,
    });
    navigator.mediaSession.playbackState = "playing";
    navigator.mediaSession.setActionHandler("play", () => player.playVideo());
    navigator.mediaSession.setActionHandler("pause", () => player.pauseVideo());
    navigator.mediaSession.setActionHandler("nexttrack",
      currentIndex + 1 < TAPE.tracks.length ? () => next() : null
    );
    navigator.mediaSession.setActionHandler("previoustrack",
      currentIndex > 0 ? () => load(currentIndex - 1) : null
    );
  }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="text-scale" content="scale">
  <title>edit tape</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https://api.github.com https://www.youtube.com https://nominatim.openstreetmap.org https://www.googleapis.com;">
  <script type="module" crossorigin src="/assets/admin-yQkzjVUt.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/utils-CxF3uIc-.js">
  <link rel="stylesheet" crossorigin href="/assets/admin-BvE0ni-8.css">
</head>
<body>
<script src="/config.js"></script>

<div class="page">

  <div id="playlist-bar">
    <select id="playlist-select"></select>
    <button class="bar-btn" id="new-btn">+ New</button>
    <button class="bar-btn" id="delete-btn">Delete</button>
    <span id="live-badge">● live</span>
    <button class="bar-btn" id="set-live-btn">Set as live</button>
  </div>

  <div id="settings">
    <input id="tape-name" type="text" placeholder="tape title" spellcheck="false">
    <div id="color-row"></div>
    <div id="location-row">
      <span id="location-display"></span>
      <button type="button" id="location-btn" class="bar-btn">Set location</button>
    </div>
    <div id="api-key-row">
      <input id="yt-api-key" type="text" placeholder="YouTube API key (optional — enables playlist import)" spellcheck="false" autocomplete="off">
    </div>
  </div>

  <div id="tracks-section">
    <p class="section-label">tracks</p>
    <ul id="track-list"></ul>
    <p id="empty-state" hidden>No tracks yet — add one below.</p>
    <div id="undo-bar" hidden>
      <span id="undo-msg"></span>
      <button id="undo-btn" class="bar-btn">Undo</button>
    </div>
  </div>

  <div id="add-section">
    <p class="section-label">add track</p>
    <div id="url-row">
      <input id="yt-input" type="text" placeholder="YouTube URL or video ID" spellcheck="false" autocomplete="off">
      <button id="fetch-btn">Fetch →</button>
    </div>
    <div id="import-row" hidden>
      <span id="import-status"></span>
      <button id="import-btn" class="bar-btn">Import playlist →</button>
    </div>
    <div id="meta-row" hidden>
      <input id="meta-title" class="meta-field" type="text" placeholder="Title">
      <input id="meta-artist" class="meta-field" type="text" placeholder="Artist">
      <button id="add-btn">Add</button>
    </div>
    <p id="fetch-status"></p>
  </div>

  <div id="actions">
    <button id="save-btn">Save</button>
    <span id="save-status"></span>
    <a id="view-link" href="index.html">View tape →</a>
  </div>

</div>

</body>
</html>
